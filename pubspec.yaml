name: hayyarabic
description: "Hayyarabic - Aplikasi pembelajaran bahasa Arab"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Firebase
  firebase_core: ^3.9.0
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.4
  firebase_storage: ^12.3.7

  # Social Auth
  google_sign_in: ^6.2.2

  # UI & Animation
  lottie: ^3.1.3
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Audio
  just_audio: ^0.9.42
  # record & audio_waveforms ditambahkan di Sprint 5 (voice note chat)

  # Local Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.3

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.1.0

  # Permissions
  permission_handler: ^11.3.1

  # Utilities
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  intl: ^0.20.1
  flutter_local_notifications: ^18.0.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.3
  riverpod_generator: ^2.6.1
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/audio/